name: Sync PTO from Slack to Zendesk WFM

on:
  push:  # TEMPORARY — remove after first successful run
    branches: [main]
  schedule:
    # Run every 2 hours during business hours ET (Mon-Fri)
    # 13:00-23:00 UTC = 8am-6pm ET (EST) / 9am-7pm ET (EDT)
    - cron: '0 13,15,17,19,21,23 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PTO sync
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          ZENDESK_SUBDOMAIN: atlascard
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
          SYNC_DAYS_AHEAD: '90'
          TIMEZONE: America/New_York
        run: python sync_pto.py --verbose --lookback-days 2
